<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OIA - Carga privada de publicaciones</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 16px; color: #1b1b1b; }
      h1 { margin: 0 0 16px; }
      p.help { margin-top: 0; color: #444; }
      form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      label { font-weight: 600; font-size: 14px; margin-bottom: 4px; display: block; }
      input, select, textarea { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #bbb; border-radius: 8px; }
      textarea { min-height: 96px; resize: vertical; }
      .full { grid-column: 1 / -1; }
      .actions { grid-column: 1 / -1; display: flex; gap: 10px; align-items: center; }
      button { background: #0b6b5d; color: #fff; border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; }
      button:hover { opacity: 0.92; }
      button:disabled { opacity: 0.6; cursor: wait; }
      #msg { min-height: 24px; font-weight: 600; }
      .ok { color: #0c6b2f; }
      .err { color: #8a1f1f; }
      .admin-toolbar { margin: 0 0 18px; }
      .btn-sheet {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 8px;
        border: 2px solid #0b6b5d;
        color: #0b6b5d;
        background: #fff;
        font-weight: 600;
        font-size: 14px;
        text-decoration: none;
      }
      .btn-sheet:hover { background: #f0f7f6; }
      @media (max-width: 760px) { form { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <h1>Carga privada - Observatorio de IA</h1>
    <p class="help">
      Completá los datos y guardá. Verás un instante la página de Google y volverás al
      formulario con la confirmación.
    </p>
    <p class="admin-toolbar">
      <a
        class="btn-sheet"
        href="https://docs.google.com/spreadsheets/d/18xXPRok4kVF81hkEDDlfDf8Vx-KI2HeywZNFSXkozwU/edit#gid=0"
        target="_blank"
        rel="noopener noreferrer"
        >Abrir plantilla en Google Sheets (equipo interno)</a
      >
    </p>

    <form id="f" method="post" action="<?= apiUrl ?>" target="_top" accept-charset="UTF-8">
      <input type="hidden" name="action" value="add" />
      <input type="hidden" name="_panel" value="1" />
      <? if (adminKey) { ?>
      <input type="hidden" name="key" value="<?= adminKey ?>" />
      <? } ?>

      <div>
        <label for="tipo">Tipo *</label>
        <select id="tipo" name="tipo" required>
          <option value="Revista">Revista</option>
          <option value="Libro">Libro</option>
          <option value="Capítulo de libro">Capítulo de libro</option>
          <option value="Repositorio">Informe</option>
          <option value="Evento">Evento</option>
          <option value="Diario">Diario</option>
        </select>
      </div>
      <div>
        <label for="anio">Año</label>
        <input id="anio" name="anio" type="number" min="1900" max="2100" />
      </div>

      <div class="full">
        <label for="titulo">Título *</label>
        <input id="titulo" name="titulo" required />
      </div>

      <div class="full">
        <label for="autores">Autor/es</label>
        <input id="autores" name="autores" />
      </div>

      <div>
        <label for="revista_o_medio">Revista / medio</label>
        <input id="revista_o_medio" name="revista_o_medio" />
      </div>
      <div>
        <label for="doi">DOI</label>
        <input id="doi" name="doi" />
      </div>

      <div>
        <label for="unidad">Unidad *</label>
        <input
          id="unidad"
          name="unidad"
          value="OIA- Observatorio de Inteligencia Artificial"
          required
        />
      </div>
      <div>
        <label for="indexacion">Indexación</label>
        <input id="indexacion" name="indexacion" />
      </div>

      <div>
        <label for="editorial">Editorial</label>
        <input id="editorial" name="editorial" />
      </div>
      <div>
        <label for="isbn">ISBN</label>
        <input id="isbn" name="isbn" />
      </div>

      <div>
        <label for="tipo_publicacion">Tipo publicación</label>
        <input id="tipo_publicacion" name="tipo_publicacion" />
      </div>
      <div>
        <label for="link">Link</label>
        <input id="link" name="link" />
      </div>

      <div>
        <label for="evento">Evento</label>
        <input id="evento" name="evento" />
      </div>
      <div>
        <label for="lugar">Lugar</label>
        <input id="lugar" name="lugar" />
      </div>

      <div>
        <label for="fecha">Fecha (texto o YYYY-MM-DD)</label>
        <input id="fecha" name="fecha" />
      </div>
      <div>
        <label for="estado">Estado</label>
        <select id="estado" name="estado">
          <option value="borrador">borrador (no visible en web)</option>
          <option value="publicado">publicado (visible en web)</option>
        </select>
      </div>

      <div class="full">
        <label for="resumen">Resumen</label>
        <textarea id="resumen" name="resumen"></textarea>
      </div>

      <div class="full">
        <label for="repositorio">Repositorio</label>
        <input id="repositorio" name="repositorio" />
      </div>

      <div class="actions">
        <button type="submit" id="save-btn">Guardar publicación</button>
        <span id="msg"></span>
      </div>
    </form>

    <script>
      (function () {
        var form = document.getElementById("f");
        var msg = document.getElementById("msg");
        var btn = document.getElementById("save-btn");
        var UNIDAD = "OIA- Observatorio de Inteligencia Artificial";

        function setMsg(text, ok) {
          msg.textContent = text;
          msg.className = ok ? "ok" : "err";
        }

        function checkSavedFromUrl() {
          var p = new URLSearchParams(window.location.search);
          if (p.get("saved") === "1") {
            setMsg("Guardado correctamente.", true);
            if (window.history && window.history.replaceState) {
              var clean = window.location.pathname + "?action=admin";
              var key = p.get("key");
              if (key) clean += "&key=" + encodeURIComponent(key);
              window.history.replaceState({}, "", clean);
            }
            return;
          }
          if (p.get("saved") === "0") {
            setMsg("No se pudo guardar: " + (p.get("err") || "error"), false);
          }
        }

        checkSavedFromUrl();

        form.addEventListener("submit", function (ev) {
          if (!form.reportValidity()) {
            ev.preventDefault();
            return;
          }
          if (btn) btn.disabled = true;
          setMsg("Guardando…", true);
        });
      })();
    </script>
  </body>
</html>
