<!DOCTYPE html>
<html lang="es-AR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="1° Jornadas internas de Inteligencia Artificial 2026 — Observatorio de IA, UCCuyo. Inscripción y carga de ponencias."
    />
    <title>1° Jornadas de IA 2026 | Observatorio de IA</title>
    <link rel="icon" type="image/png" href="assets/logo-observatorio-ia.png" />
    <style>
      :root {
        --rojo: #7a1532;
        --rojo-oscuro: #4a0c1f;
        --verde: #064a38;
        --verde-medio: #0d6e4f;
        --amarillo: #e8b923;
        --blanco: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #1a0a10;
        font-family: "Source Sans 3", "Segoe UI", system-ui, sans-serif;
      }

      .page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .flyer {
        position: relative;
        width: min(100%, 28rem);
        aspect-ratio: 9 / 16;
        max-height: calc(100vh - 2rem);
        border-radius: 1rem;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        background: var(--rojo);
      }

      .flyer img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
        pointer-events: none;
        user-select: none;
      }

      /* Zona clickeable sobre el botón dibujado del PNG */
      .flyer-cta {
        position: absolute;
        left: 8.5%;
        right: 8.5%;
        bottom: 11.5%;
        height: 7.2%;
        border-radius: 0.85rem;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: transparent;
        font-size: 0;
        z-index: 2;
      }

      .flyer-cta:focus-visible {
        outline: 3px solid var(--amarillo);
        outline-offset: 3px;
        color: var(--blanco);
        font-size: 0.95rem;
        font-weight: 700;
        background: rgba(6, 74, 56, 0.92);
      }

      .flyer-cta:hover {
        box-shadow: 0 0 0 3px rgba(232, 185, 35, 0.55);
      }

      .fallback {
        margin-top: 1rem;
        text-align: center;
        max-width: 28rem;
      }

      .fallback a {
        color: #f3d78a;
        font-weight: 700;
      }

      .stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      .btn-direct {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.85rem 1.35rem;
        border-radius: 0.75rem;
        background: linear-gradient(135deg, var(--verde-medio), var(--verde));
        color: var(--blanco);
        font-weight: 700;
        text-decoration: none;
        font-size: 1rem;
        box-shadow: 0 8px 24px rgba(6, 74, 56, 0.45);
      }

      .btn-direct:hover {
        filter: brightness(1.08);
      }

      .hint {
        color: rgba(255, 255, 255, 0.72);
        font-size: 0.9rem;
        margin: 0;
        text-align: center;
        max-width: 28rem;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="stack">
        <p class="hint">
          Tocá el botón verde del flayer para ir a la inscripción y carga de
          ponencias.
        </p>
        <div class="flyer" role="img" aria-label="Flayer 1° Jornadas internas de Inteligencia Artificial 2026">
          <img
            src="assets/flayer-jornadas-ia-2026-stories.png"
            width="1080"
            height="1920"
            alt="1° Jornadas internas de Inteligencia Artificial 2026 — Observatorio de IA"
            decoding="async"
          />
          <a
            class="flyer-cta"
            href="https://claudiomlarrea.github.io/observatorio-ia/#jornadas-ia"
            target="_blank"
            rel="noopener noreferrer"
            >Inscribite y subí la ponencia</a
          >
        </div>
        <a
          class="btn-direct"
          href="https://claudiomlarrea.github.io/observatorio-ia/#jornadas-ia"
          >Inscribite y subí la ponencia</a
        >
        <p class="hint fallback">
          Si el flayer no responde, usá este enlace:
          <a href="https://claudiomlarrea.github.io/observatorio-ia/#jornadas-ia"
            >observatorio-ia/#jornadas-ia</a
          >
        </p>
      </div>
    </div>
  </body>
</html>
